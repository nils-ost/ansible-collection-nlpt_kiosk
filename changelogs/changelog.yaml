ancestor: null
releases:
  1.0.0:
    changes:
      release_summary:
        "This is the first proper release of ``nils_ost.nlpt_kiosk``
        collection on 2026-03-24.

        This release contains everything that is needed to install an Kiosk-Controller
        and configure Raspberry Pis to act as Kiosks."
    fragments:
      - v1.0.0.yml
    objects:
      role:
        - description: installs NLPT\-Kiosk\-Controller within docker.
          name: controller
          namespace: null
        - description: configures Raspberry Pi to be a Kiosk, connected to NLPT\-Kiosk\-Controller.
          name: rpi
          namespace: null
    release_date: "2026-03-24"
